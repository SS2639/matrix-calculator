<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行列電卓 (Mobile)</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base/index.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile/index.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ui/switcher.css') }}">
</head>
<body data-ui-mode="{{ ui_mode|default('mobile') }}">
  <header class="mobile-header">
    <h1>行列電卓</h1>
    <button type="button" class="ui-switch-btn" data-ui-switch-target="desktop">デスクトップ表示へ</button>
  </header>

  <main class="mobile-main">
    <section class="mobile-card mobile-result-card">
      <h2 class="mobile-section-title">結果</h2>
      <div class="result-log" data-mobile-result-log></div>
    </section>

    <section class="mobile-card mobile-expression-card">
      <div class="top-bar">
        <div
          class="expression-bar"
          tabindex="0"
          role="textbox"
          aria-label="数式"
          aria-multiline="false"
        ></div>
      </div>
      <div class="mobile-fixed-actions" role="group" aria-label="式操作">
        <button
          type="button"
          class="mobile-val-toggle-btn"
          data-mobile-val-toggle
          aria-label="数値入力の開閉"
          aria-controls="mobileScalarWrap"
          aria-expanded="false"
        >
          val<span class="mobile-val-toggle-icon" aria-hidden="true">▼</span>
        </button>
        <button type="button" class="mobile-paren-btn" data-mobile-paren="(" aria-label="開き括弧">(</button>
        <button type="button" class="mobile-paren-btn" data-mobile-paren=")" aria-label="閉じ括弧">)</button>
        <button type="button" class="mobile-equals-btn calc-btn" aria-label="計算">=</button>
        <button type="button" class="mobile-backspace-btn" aria-label="1つ削除">⌫</button>
        <button type="button" class="clear-btn" aria-label="式をクリア">C</button>
      </div>
      <div class="mobile-scalar-input-wrap is-collapsed" id="mobileScalarWrap">
        <label class="mobile-scalar-label" for="mobileScalarInput">数値入力</label>
        <div class="mobile-scalar-input-row">
          <input
            id="mobileScalarInput"
            class="mobile-scalar-input"
            type="text"
            inputmode="decimal"
            placeholder="例: -3.5 / 2e-3"
            autocomplete="off"
            spellcheck="false"
            data-mobile-scalar-input
          >
          <button type="button" class="mobile-scalar-insert-btn" data-mobile-scalar-insert aria-label="数値を挿入">↑</button>
        </div>
        <p class="mobile-scalar-error" data-mobile-scalar-error aria-live="polite"></p>
      </div>
    </section>

    <section class="mobile-card mobile-operators-card">
      <div class="operator-pad mobile-operator-pad">
        <div class="operator-pad-tabs" role="tablist" aria-label="演算子カテゴリ">
          <button type="button" class="op-tab-btn is-active" role="tab" aria-selected="true" data-tab="arithmetic">四則演算</button>
          <button type="button" class="op-tab-btn" role="tab" aria-selected="false" data-tab="basic">基本</button>
          <button type="button" class="op-tab-btn" role="tab" aria-selected="false" data-tab="decompose">分解</button>
        </div>
        <div class="operator-tab-panels">
          <div class="operator-tab-panel is-active" data-panel="arithmetic" role="tabpanel">
            <div class="op-row">
              <button type="button" class="op-btn binary-op" data-op="+">+</button>
              <button type="button" class="op-btn binary-op" data-op="-">-</button>
              <button type="button" class="op-btn binary-op" data-op="*">*</button>
              <button type="button" class="op-btn binary-op" data-op="/">/</button>
              <button type="button" class="op-btn binary-op" data-op="**">**</button>
            </div>
          </div>
          <div class="operator-tab-panel" data-panel="basic" role="tabpanel">
            <div class="op-row">
              <button type="button" class="op-btn operation-func" data-op="det">det</button>
              <button type="button" class="op-btn analysis-func" data-op="tr">tr</button>
              <button type="button" class="op-btn operation-func" data-op="norm">norm</button>
              <button type="button" class="op-btn operation-func" data-op="t">T</button>
              <button type="button" class="op-btn operation-func" data-op="H">H</button>
              <button type="button" class="op-btn operation-func" data-op="inv">inv</button>
              <button type="button" class="op-btn analysis-func" data-op="rref">rref</button>
            </div>
          </div>
          <div class="operator-tab-panel" data-panel="decompose" role="tabpanel">
            <div class="op-row">
              <button type="button" class="op-btn analysis-func" data-op="eig">eig</button>
              <button type="button" class="op-btn analysis-func" data-op="LU">LU</button>
              <button type="button" class="op-btn analysis-func" data-op="SVD">SVD</button>
              <button type="button" class="op-btn analysis-func" data-op="QR">QR</button>
              <button type="button" class="op-btn analysis-func" data-op="jord">jord</button>
              <button type="button" class="op-btn operation-func" data-op="exp">exp</button>
              <button type="button" class="op-btn operation-func" data-op="sin">sin</button>
              <button type="button" class="op-btn operation-func" data-op="cos">cos</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="mobile-card mobile-matrix-card">
      <div class="mobile-matrix-toolbar">
        <button type="button" class="add-matrix-btn" data-mobile-add-matrix>行列追加</button>
        <div class="mobile-page-controls">
          <button type="button" class="mobile-nav-btn" data-mobile-nav="prev">&lt;</button>
          <span class="mobile-page-indicator" data-mobile-page-indicator>0/0</span>
          <button type="button" class="mobile-nav-btn" data-mobile-nav="next">&gt;</button>
        </div>
      </div>
      <div class="mobile-matrix-viewport" data-mobile-matrix-viewport>
        <div class="mobile-matrix-track" data-mobile-matrix-track></div>
      </div>
    </section>
  </main>

  <script type="module" src="{{ url_for('static', filename='js/ui/switcher.js') }}"></script>
  <script type="module" src="{{ url_for('static', filename='js/ui/mobile/main.js') }}"></script>
</body>
</html>
