<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>行列電卓</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base/index.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/desktop/index.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ui/switcher.css') }}">
</head>
<body data-ui-mode="{{ ui_mode|default('desktop') }}">
  <header class="page-header">
    <h1>行列電卓</h1>
    <button type="button" class="help-btn" aria-label="ヘルプ" title="ヘルプ">?</button>
    <div class="ui-switcher-slot">
      <button type="button" class="ui-switch-btn" data-ui-switch-target="mobile">モバイル表示へ</button>
    </div>
  </header>

  <div class="help-overlay" id="helpOverlay" aria-hidden="true">
    <div class="help-panel">
      <button type="button" class="help-close icon-btn delete-btn" aria-label="ヘルプを閉じる">&times;</button>
      <div class="help-content"></div>
    </div>
  </div>

  <div class="calculator-panel">
    <div class="top-bar">
      <div
        class="expression-bar"
        tabindex="0"
        role="textbox"
        aria-label="数式"
        aria-multiline="false"
      ></div>
      <div class="desktop-expression-actions">
        <button type="button" class="desktop-backspace-btn" aria-label="1つ削除">←</button>
        <button type="button" class="clear-btn" aria-label="式をクリア">C</button>
      </div>
    </div>
  </div>

  <div class="workspace-grid">
    <div class="left-pane">
    <div class="operator-pad">
      <div class="operator-pad-tabs" role="tablist" aria-label="演算子カテゴリ">
        <button type="button" class="op-tab-btn is-active" role="tab" aria-selected="true" data-tab="arithmetic">四則演算</button>
        <button type="button" class="op-tab-btn" role="tab" aria-selected="false" data-tab="basic">基本操作</button>
        <button type="button" class="op-tab-btn" role="tab" aria-selected="false" data-tab="decompose">分解・行列関数</button>
      </div>
      <div class="operator-tab-panels">
        <div class="operator-tab-panel is-active" data-panel="arithmetic" role="tabpanel">
          <div class="op-row">
            <button type="button" class="op-btn binary-op" data-op="+">+</button>
            <button type="button" class="op-btn binary-op" data-op="-">-</button>
            <button type="button" class="op-btn binary-op" data-op="*">*</button>
            <button type="button" class="op-btn binary-op" data-op="/">/</button>
            <button type="button" class="op-btn binary-op" data-op="**">**</button>
          </div>
          <div class="op-row">
            <button type="button" class="op-btn scalar-op-btn" data-op="val">val</button>
            <button type="button" class="op-btn paren" data-op="(">(</button>
            <button type="button" class="op-btn paren" data-op=")">)</button>
            <button type="button" class="calc-btn">=</button>
          </div>
        </div>
        <div class="operator-tab-panel" data-panel="basic" role="tabpanel">
          <div class="op-row">
            <button type="button" class="op-btn operation-func" data-op="det">det</button>
            <button type="button" class="op-btn analysis-func" data-op="tr">tr</button>
            <button type="button" class="op-btn operation-func" data-op="norm">norm</button>
          </div>
          <div class="op-row">
            <button type="button" class="op-btn operation-func" data-op="t">T</button>
            <button type="button" class="op-btn operation-func" data-op="H">H</button>
            <button type="button" class="op-btn operation-func" data-op="inv">inv</button>
            <button type="button" class="op-btn analysis-func" data-op="rref">rref</button>
          </div>
        </div>
        <div class="operator-tab-panel" data-panel="decompose" role="tabpanel">
          <div class="op-row">
            <button type="button" class="op-btn analysis-func" data-op="eig">eig</button>
            <button type="button" class="op-btn analysis-func" data-op="LU">LU</button>
            <button type="button" class="op-btn analysis-func" data-op="SVD">SVD</button>
            <button type="button" class="op-btn analysis-func" data-op="QR">QR</button>
            <button type="button" class="op-btn analysis-func" data-op="jord">jord</button>
          </div>
          <div class="op-row">
            <button type="button" class="op-btn operation-func" data-op="exp">exp</button>
            <button type="button" class="op-btn operation-func" data-op="sin">sin</button>
            <button type="button" class="op-btn operation-func" data-op="cos">cos</button>
          </div>
        </div>
      </div>
    </div>
    
    <button type="button" class="add-matrix-btn">行列追加</button>
    <div class="matrices-container"></div>
    </div>

    <div class="result-log-wrapper">
      <div class="result-log-title">結果ログ</div>
      <div class="result-log"></div>
    </div>
  </div>

  <script type="module" src="{{ url_for('static', filename='js/ui/switcher.js') }}"></script>
  <script type="module" src="{{ url_for('static', filename='js/ui/desktop/main.js') }}"></script>
</body>
</html>
